version: '3.8'
services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --reload

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
